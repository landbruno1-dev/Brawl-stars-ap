<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Campeonato Brawl Pro</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  text-align: center;
}

.container {
  max-width: 400px;
  margin: auto;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  margin-top: 15px;
}

input, button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}

button {
  background: #9333ea;
  color: white;
  font-weight: bold;
}

.admin {
  display: none;
}

.pix {
  background: #111827;
  padding: 10px;
  border-radius: 8px;
  word-break: break-all;
}
</style>
</head>

<body>

<div class="container">

<h2>🏆 Campeonato Brawl Pro</h2>

<div class="card">
<p id="vagas"></p>
<p>💰 Valor: R$ 10,00</p>
</div>

<div class="card">
<input id="nome" placeholder="Seu nome">
<input id="celular" placeholder="Seu número">
<input id="nick" placeholder="Seu nick">

<button onclick="cadastrar()">Garantir vaga</button>
</div>

<div class="card" id="pagamento" style="display:none;">
<h3>💰 Pagamento via Pix</h3>

<div class="pix" id="pixKey">
landbruno1@gmail.com
</div>

<button onclick="copiarPix()">Copiar chave Pix</button>

<p>Após pagar, envie o comprovante no WhatsApp</p>

<button onclick="irWhats()">Enviar comprovante</button>
</div>

<div class="card">
<h3>👥 Jogadores Ativos</h3>
<div id="lista"></div>
</div>

<div class="card">
<h3>🎮 Link da Partida</h3>
<div id="linkPartida">🔒 Será liberado pelo administrador</div>
</div>

<hr>

<button onclick="login()">Painel Admin</button>

<div class="admin" id="admin">

<div class="card">
<h3>Admin</h3>

<input id="novoLink" placeholder="Cole o link da sala aqui">

<button onclick="liberarLink()">Liberar Link da Partida</button>

<button onclick="resetar()">Resetar tudo</button>

</div>

</div>

</div>

<script>
let totalVagas = 9;

function getDados(){
  return JSON.parse(localStorage.getItem("inscritos") || "[]");
}

function salvar(dados){
  localStorage.setItem("inscritos", JSON.stringify(dados));
}

function atualizar(){
  let dados = getDados();

  document.getElementById("vagas").innerText =
    `Vagas: ${dados.length}/${totalVagas}`;

  let html = "";
  dados.forEach(p => {
    html += `<p>${p.nome} - ${p.nick}</p>`;
  });

  document.getElementById("lista").innerHTML = html;
}

function cadastrar(){
  let nome = document.getElementById("nome").value;
  let celular = document.getElementById("celular").value;
  let nick = document.getElementById("nick").value;

  let dados = getDados();

  if(dados.length >= totalVagas){
    alert("Vagas esgotadas!");
    return;
  }

  dados.push({nome, celular, nick});
  salvar(dados);

  document.getElementById("pagamento").style.display = "block";

  atualizar();
}

function copiarPix(){
  let chave = document.getElementById("pixKey").innerText;
  navigator.clipboard.writeText(chave);
  alert("Chave Pix copiada!");
}

function irWhats(){
  let msg = "Já fiz o pagamento, segue comprovante";
  window.location.href = `https://wa.me/5521991112671?text=${encodeURIComponent(msg)}`;
}

function login(){
  let senha = prompt("Senha admin:");
  if(senha === "1234"){
    document.getElementById("admin").style.display = "block";
  }
}

function liberarLink(){
  let link = document.getElementById("novoLink").value;
  localStorage.setItem("link", link);
  document.getElementById("linkPartida").innerHTML =
    `<a href="${link}" target="_blank">🔓 Entrar na partida</a>`;
}

function carregarLink(){
  let link = localStorage.getItem("link");
  if(link){
    document.getElementById("linkPartida").innerHTML =
      `<a href="${link}" target="_blank">🔓 Entrar na partida</a>`;
  }
}

function resetar(){
  localStorage.clear();
  location.reload();
}

atualizar();
carregarLink();
</script>

</body>
</html>
