<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Diário Brawl Pro</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  text-align: center;
}

.container {
  max-width: 400px;
  margin: auto;
}

input, button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}

button {
  background: #22c55e;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

.admin {
  display: none;
  background: #1e293b;
  padding: 10px;
  margin-top: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h2>🏆 Diário Brawl Pro</h2>

  <p id="vagas"></p>

  <input id="nome" placeholder="Seu nome">
  <input id="celular" placeholder="Seu número">
  <input id="nick" placeholder="Seu nick">

  <button onclick="cadastrar()">Garantir vaga</button>

  <hr>

  <button onclick="login()">Painel Admin</button>

  <div class="admin" id="admin">
    <h3>Admin</h3>
    <div id="lista"></div>
    <button onclick="resetar()">Resetar vagas</button>
  </div>

</div>

<script>
let totalVagas = 9;

function getDados(){
  return JSON.parse(localStorage.getItem("inscritos") || "[]");
}

function salvar(dados){
  localStorage.setItem("inscritos", JSON.stringify(dados));
}

function atualizarVagas(){
  let dados = getDados();
  document.getElementById("vagas").innerText =
    `Vagas: ${dados.length}/${totalVagas}`;
}

function cadastrar(){
  let nome = document.getElementById("nome").value;
  let celular = document.getElementById("celular").value;
  let nick = document.getElementById("nick").value;

  let dados = getDados();

  if(dados.length >= totalVagas){
    alert("Vagas esgotadas!");
    return;
  }

  dados.push({nome, celular, nick});
  salvar(dados);

  let msg = `Quero garantir vaga no campeonato 🔥\nNome:${nome}\nNick:${nick}`;
  window.location.href = `https://wa.me/5521991112671?text=${encodeURIComponent(msg)}`;

  atualizarVagas();
}

function login(){
  let senha = prompt("Senha admin:");
  if(senha === "1234"){
    document.getElementById("admin").style.display = "block";
    carregarLista();
  }
}

function carregarLista(){
  let dados = getDados();
  let html = "";

  dados.forEach((p, i)=>{
    html += `
      <p>${p.nome} - ${p.nick}
      <button onclick="remover(${i})">X</button></p>
    `;
  });

  document.getElementById("lista").innerHTML = html;
}

function remover(i){
  let dados = getDados();
  dados.splice(i,1);
  salvar(dados);
  carregarLista();
  atualizarVagas();
}

function resetar(){
  localStorage.removeItem("inscritos");
  carregarLista();
  atualizarVagas();
}

atualizarVagas();
</script>

</body>
</html>
