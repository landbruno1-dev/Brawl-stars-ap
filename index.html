<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campeonato Brawl</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  margin: 0;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 10px;
}

.card {
  background: #1e293b;
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
  font-size: 14px;
}

input, textarea, button {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  border-radius: 6px;
  border: none;
}

button {
  background: #9333ea;
  color: white;
  font-weight: bold;
}

.admin {
  display: none;
}

.pix {
  background: #111827;
  padding: 8px;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="container">

<h2>🏆 Campeonato Brawl</h2>

<div class="card">
<p id="infoValores"></p>
<p id="infoVagas"></p>
</div>

<div class="card">
<input id="nome" placeholder="Seu nome">
<input id="nick" placeholder="Seu nick">

<button onclick="abrirPagamento()">Garantir vaga</button>
</div>

<div class="card" id="pagamento" style="display:none;">
<h3>💰 Pix</h3>

<div class="pix">landbruno1@gmail.com</div>

<button onclick="copiarPix()">Copiar chave Pix</button>

<button onclick="irWhats()">Enviar comprovante</button>
</div>

<div class="card">
<h3>👥 Jogadores</h3>
<div id="lista">Nenhum ainda</div>
</div>

<div class="card">
<h3>🎮 Partida</h3>
<div id="linkPartida">🔒 Aguardando liberação</div>
</div>

<hr>

<button onclick="login()">Admin</button>

<div class="admin" id="admin">

<div class="card">

<h3>Controle</h3>

<input id="entrada" placeholder="Valor entrada (ex: 5)">
<input id="kill" placeholder="Valor por kill (ex: 3)">
<input id="premio" placeholder="Prêmio (ex: 10)">
<input id="vagas" placeholder="Total de vagas (ex: 10)">

<textarea id="jogadores" placeholder="Lista de jogadores (um por linha)"></textarea>

<input id="link" placeholder="Link da partida">

<button onclick="salvar()">Salvar tudo</button>

</div>

</div>

</div>

<script>
function abrirPagamento(){
  let nome = document.getElementById("nome").value;
  let nick = document.getElementById("nick").value;

  if(nome === "" || nick === ""){
    alert("Preencha nome e nick");
    return;
  }

  document.getElementById("pagamento").style.display = "block";
}

function copiarPix(){
  navigator.clipboard.writeText("landbruno1@gmail.com");
  alert("Pix copiado!");
}

function irWhats(){
  let nome = document.getElementById("nome").value;
  let nick = document.getElementById("nick").value;

  let msg = `Já paguei ✅\nNome: ${nome}\nNick: ${nick}`;
  window.location.href = `https://wa.me/5521991112671?text=${encodeURIComponent(msg)}`;
}

function login(){
  let senha = prompt("Senha:");
  if(senha === "1234"){
    document.getElementById("admin").style.display = "block";
    carregarAdmin();
  }
}

function salvar(){
  let dados = {
    entrada: document.getElementById("entrada").value,
    kill: document.getElementById("kill").value,
    premio: document.getElementById("premio").value,
    vagas: document.getElementById("vagas").value,
    jogadores: document.getElementById("jogadores").value,
    link: document.getElementById("link").value
  };

  localStorage.setItem("dados", JSON.stringify(dados));
  carregar();
}

function carregar(){
  let dados = JSON.parse(localStorage.getItem("dados"));

  if(!dados) return;

  document.getElementById("infoValores").innerText =
    `Entrada: R$${dados.entrada} | Kill: R$${dados.kill} | Prêmio: R$${dados.premio}`;

  document.getElementById("infoVagas").innerText =
    `Vagas: ${dados.vagas}`;

  if(dados.jogadores){
    document.getElementById("lista").innerHTML =
      dados.jogadores.replace(/\n/g, "<br>");
  }

  if(dados.link){
    document.getElementById("linkPartida").innerHTML =
      `<a href="${dados.link}" target="_blank">Entrar na partida</a>`;
  }
}

function carregarAdmin(){
  let dados = JSON.parse(localStorage.getItem("dados"));
  if(!dados) return;

  document.getElementById("entrada").value = dados.entrada;
  document.getElementById("kill").value = dados.kill;
  document.getElementById("premio").value = dados.premio;
  document.getElementById("vagas").value = dados.vagas;
  document.getElementById("jogadores").value = dados.jogadores;
  document.getElementById("link").value = dados.link;
}

carregar();
</script>

</body>
</html>
